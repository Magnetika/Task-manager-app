name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      CI: true
      JWT_SECRET: ci-test-secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install backend dependencies
        run: npm install --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund
        working-directory: client

      - name: Start backend
        run: PORT=5000 npm start > backend.log 2>&1 &

      - name: Start frontend
        run: CI=false PORT=3000 npm start --prefix client > frontend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat backend.log
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:3000/ > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          cat frontend.log
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test --workers=1 --timeout=90000

      - name: Print app logs on failure
        if: failure()
        run: |
          echo "===== backend.log ====="
          cat backend.log || true
          echo "===== frontend.log ====="
          cat frontend.log || true
